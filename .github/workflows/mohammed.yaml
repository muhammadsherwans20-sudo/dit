name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Kept this from your original code so you can still test it manually!

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker Buildx, which is required for the build-push action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticates with your Docker Hub account securely
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Builds the image from your Dockerfile and pushes it
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/your-image-name:latest
